<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden" id="quiz-container">
        <div class="bg-indigo-600 p-4">
            <h1 class="text-white text-2xl font-bold text-center">Quiz Test</h1>
            <p class="text-indigo-200 text-center text-sm">Savollarga javob bering</p>
        </div>

        <div class="p-6" id="quiz-content">
            <div class="flex justify-between mb-4">
                <span class="text-gray-500">Savol <span id="current-q">1</span>/<span id="total-q">5</span></span>
                <span class="text-indigo-600 font-semibold">Ball: <span id="score">0</span></span>
            </div>

            <h2 class="text-xl font-semibold mb-6 text-gray-800" id="question-text">Savol matni</h2>

            <div class="space-y-3" id="answers-container">
                <button class="answer-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all" data-index="0">
                    Javob A
                </button>
                <button class="answer-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all" data-index="1">
                    Javob B
                </button>
                <button class="answer-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all" data-index="2">
                    Javob C
                </button>
                <button class="answer-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all" data-index="3">
                    Javob D
                </button>
            </div>

            <button id="next-btn" class="mt-6 w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Keyingi savol
            </button>
        </div>

        <div class="p-6 hidden" id="result-content">
            <div class="text-center">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Test Yakunlandi!</h2>
                <p class="text-gray-600 mb-4">Sizning natijangiz:</p>
                <p class="text-4xl font-bold text-indigo-600 mb-6"><span id="final-score">0</span>/5</p>
                <button onclick="restartQuiz()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-all">
                    Qayta boshlash
                </button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            {
                question: "HTML nimaga ishlatiladi?",
                answers: ["Ma'lumotlar bazasini boshqarish", "Veb sahifalar yaratish", "Dasturlash tili", "Grafik dizayn"],
                correct: 1
            },
            {
                question: "Tailwind CSS bu nima?",
                answers: ["JavaScript kutubxona", "CSS framework", "Ma'lumotlar bazasi", "Veb server"],
                correct: 1
            },
            {
                question: "JavaScript nima uchun ishlatiladi?",
                answers: ["Veb sahifalarga interaktivlik qo'shish", "Rang berish", "Matn yozish", "Rasmlar saqlash"],
                correct: 0
            },
            {
                question: "CSS nimaga ishlatiladi?",
                answers: ["Ma'lumotlar saqlash", "Veb sahifalarni bezash", "Fayllarni yuklash", "Elektron pochta yuborish"],
                correct: 1
            },
            {
                question: "DOM nima?",
                answers: ["Dastur Object Model", "Document Object Model", "Data Object Model", "Digital Option Module"],
                correct: 1
            },
            {
                question: "Python dasturlash tilining asoschisi kim?",
                answers: ["James Gosling", "Guido van Rossum", "Bjarne Stroustrup", "Dennis Ritchie"],
                correct: 1
            },
            {
                question: "React qaysi kompaniya tomonidan yaratilgan?",
                answers: ["Google", "Microsoft", "Facebook (Meta)", "Amazon"],
                correct: 2
            },
            {
                question: "Git nima uchun ishlatiladi?",
                answers: ["Ma'lumotlar bazasi", "Versiya boshqaruvi", "Grafik dizayn", "Veb hosting"],
                correct: 1
            },
            {
                question: "SQL nima uchun ishlatiladi?",
                answers: ["Veb sahifa yaratish", "Ma'lumotlar bazasini boshqarish", "Rasm tahrirlash", "Video montaj"],
                correct: 1
            },
            {
                question: "API nima?",
                answers: ["App Programming Interface", "Application Programming Interface", "Advanced Program Interface", "Automatic Protocol Integration"],
                correct: 1
            },
            {
                question: "JSON nima uchun ishlatiladi?",
                answers: ["Matn formatlash", "Ma'lumotlarni almashish", "Rasm formatlash", "Veb sahifa bezash"],
                correct: 1
            },
            {
                question: "Node.js qaysi tilda yozilgan?",
                answers: ["Python", "Java", "JavaScript", "C++"],
                correct: 2
            },
            {
                question: "Bootstrap CSS framework kim tomonidan yaratilgan?",
                answers: ["Google", "Twitter", "Facebook", "Microsoft"],
                correct: 1
            },
            {
                question: "URL qisqartmasi nima?",
                answers: ["Universal Resource Locator", "Uniform Resource Locator", "United Resource Link", "Universal Reference List"],
                correct: 1
            },
            {
                question: "Veb-sahifalarda JavaScript qayerida yoziladi?",
                answers: ["<script> tegida", "<style> tegida", "<html> tegida", "<css> tegida"],
                correct: 0
            }
        ];

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            questions = shuffleArray([...allQuestions]);
            currentQuestion = 0;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('total-q').textContent = questions.length;
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('result-content').classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = q.question;
            
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = q.answers[index];
                btn.className = 'answer-btn w-full p-4 text-left border-2 border-gray-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all';
                btn.disabled = false;
            });

            document.getElementById('next-btn').disabled = true;
            selectedAnswer = null;
        }

        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (selectedAnswer !== null) return;
                
                selectedAnswer = parseInt(this.dataset.index);
                
                const buttons = document.querySelectorAll('.answer-btn');
                buttons.forEach((b, i) => {
                    if (i === questions[currentQuestion].correct) {
                        b.classList.add('border-green-500', 'bg-green-50');
                    } else if (i === selectedAnswer && selectedAnswer !== questions[currentQuestion].correct) {
                        b.classList.add('border-red-500', 'bg-red-50');
                    }
                    b.disabled = true;
                });

                if (selectedAnswer === questions[currentQuestion].correct) {
                    score++;
                    document.getElementById('score').textContent = score;
                }

                document.getElementById('next-btn').disabled = false;
            });
        });

        document.getElementById('next-btn').addEventListener('click', function() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-content').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
        }

        function restartQuiz() {
            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
